---

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: "Page Not Found" }}</title>
    <meta name="robots" content="{{ page.robots | default: 'noindex, nofollow' }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        color-scheme: light dark;
        --nf-bg: #f7f7f4;
        --nf-text: #222;
        --nf-muted: #63635e;
        --nf-link: #245c77;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --nf-bg: #171817;
          --nf-text: #ecece8;
          --nf-muted: #b6b6ae;
          --nf-link: #7ab1cf;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background: var(--nf-bg);
        color: var(--nf-text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(100%, 560px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        letter-spacing: 0;
        line-height: 1.05;
      }

      p {
        margin: 0 0 20px;
        color: var(--nf-muted);
        font-size: 1.05rem;
      }

      a {
        color: var(--nf-link);
        font-weight: 600;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
